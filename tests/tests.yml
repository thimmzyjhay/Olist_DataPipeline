version: 2

models:
    - name: stg_customers
     columns:
        - name: customer_unique_id
        tests:
            - not_null
            - unique
       
    - name: stg_order_items
     columns: 
        - name: order_item_id
        tests: 
            - not_null
            - unique

    - name: stg_order_reviews
     columns: 
        - name: review_id
        tests: 
            - not_null
            - unique
    
    - name: stg_order_products
     columns: 
        - name: product_id
        tests: 
            - not_null

    - name: stg_sellers
     columns: 
        - name: seller_id
        tests: 
            - not_null